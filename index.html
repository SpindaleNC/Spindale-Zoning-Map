        function highlightFeature(e) {
            highlightLayer = e.target;

            if (e.target.feature.geometry.type === 'LineString' || e.target.feature.geometry.type === 'MultiLineString') {
              highlightLayer.setStyle({
                color: 'rgba(255, 255, 0, 1.00)',
              });
            } else {
              highlightLayer.setStyle({
                fillColor: 'rgba(255, 255, 0, 1.00)',
                fillOpacity: 1
              });
            }
        }

            zoomControl:false, maxZoom:28, minZoom:2

        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        // remove popup's row if "visible-with-data"
        function hasPopupValue(value) {
            if (value === null || value === undefined) {
                return false;
            }
            var text = String(value).trim();
            return text !== '' && text.toLowerCase() !== 'null' && text.toLowerCase() !== 'false';
        }

        function popupLinkValue(value) {
            return autolinker.link(String(value).replace(/'/g, '\'').toLocaleString());
        }

        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && !hasPopupValue(feature.properties[key])) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }

        function pop_HCI_1(feature, layer) {
            layer.on({
                mouseout: function(e) {
                    for (var i in e.target._eventParents) {

                            e.target._eventParents[i].resetStyle(e.target);
                        }
                    }
                },
                mouseover: highlightFeature,
            });
            var popupContent = '<table>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

		document.addEventListener("DOMContentLoaded", function() {
            // set new Layers List height which considers toggle icon
            function newLayersListHeight() {
                var layerScrollbarElement = document.querySelector('.leaflet-control-layers-scrollbar');
                if (layerScrollbarElement) {
                    var layersListElement = document.querySelector('.leaflet-control-layers-list');
                    var originalHeight = layersListElement.style.height 
                        || window.getComputedStyle(layersListElement).height;
                    var newHeight = parseFloat(originalHeight) - 50;
                    layersListElement.style.height = newHeight + 'px';
                }
            }
            var isLayersListExpanded = true;
            var controlLayersElement = document.querySelector('.leaflet-control-layers');
            var toggleLayerControl = document.querySelector('.leaflet-control-layers-toggle');
            // toggle Collapsed/Expanded and apply new Layers List height
            toggleLayerControl.addEventListener('click', function() {
                if (isLayersListExpanded) {
                    controlLayersElement.classList.remove('leaflet-control-layers-expanded');
                } else {
                    controlLayersElement.classList.add('leaflet-control-layers-expanded');
                }
                isLayersListExpanded = !isLayersListExpanded;
                newLayersListHeight()
            });	
			// apply new Layers List height if toggle layerstree
			if (controlLayersElement) {
				controlLayersElement.addEventListener('click', function(event) {
					var toggleLayerHeaderPointer = event.target.closest('.leaflet-layerstree-header-pointer span');
					if (toggleLayerHeaderPointer) {
						newLayersListHeight();
					}
				});
			}
            // Collapsed/Expanded at Start to apply new height
            setTimeout(function() {
                toggleLayerControl.click();
            }, 10);
            setTimeout(function() {
                toggleLayerControl.click();
            }, 10);
            // Collapsed touch/small screen
            var isSmallScreen = window.innerWidth < 650;
            if (isSmallScreen) {
                setTimeout(function() {
                    controlLayersElement.classList.remove('leaflet-control-layers-expanded');
                    isLayersListExpanded = !isLayersListExpanded;
                }, 500);
            }  
        });       
        setBounds();
        // --- Road labels that sit along the road centerline ---
        // This replaces the qgis2web tooltip labels. It picks the best straight segment
        // of each road feature, rotates the text to match that segment, then flips it
        // when needed so the label is never upside down.
        map.createPane('pane_RoadLabels_Custom');
        map.getPane('pane_RoadLabels_Custom').style.zIndex = 650;
        map.getPane('pane_RoadLabels_Custom').style.pointerEvents = 'none';

        function flattenRoadPaths(latlngs) {
            var paths = [];
            function walk(arr) {
                if (!arr || !arr.length) return;
                if (arr[0] && typeof arr[0].lat === 'number') {
                    paths.push(arr);
                } else {
                    for (var i = 0; i < arr.length; i++) walk(arr[i]);
                }
            }
            walk(latlngs);
            return paths;
        }

        function normalizeAngle(angle) {
            while (angle <= -180) angle += 360;
            while (angle > 180) angle -= 360;
            return angle;
        }

        function correctedRoadLabelAngle(angle, x, y) {
            // Working sketch logic:
            // east/west roads read left-to-right;
            // north/south roads above the map center use +90;
            // north/south roads below the map center use -90;
            // diagonal roads are flipped only when they would read upside down.
            angle = normalizeAngle(angle);

            var absAngle = Math.abs(angle);
            var center = map.getSize().divideBy(2);

            // Nearly horizontal: keep it left-to-right.
            if (absAngle <= 8 || absAngle >= 172) {
                return 0;
            }

            // Nearly vertical: use the top/bottom pattern from your sketch.
            if (Math.abs(absAngle - 90) <= 8) {
                return y < center.y ? 90 : -90;
            }

            // General case: keep label readable. This prevents upside-down text
            // while still letting diagonal roads keep their actual angle.
            if (angle > 90) angle -= 180;
            if (angle < -90) angle += 180;
            return angle;
        }

        function bestLabelPosition(layer) {
            var paths = flattenRoadPaths(layer.getLatLngs());
            var best = null;

            for (var p = 0; p < paths.length; p++) {
                var path = paths[p];
                for (var i = 0; i < path.length - 1; i++) {
                    var a = map.latLngToLayerPoint(path[i]);
                    var b = map.latLngToLayerPoint(path[i + 1]);
                    var dx = b.x - a.x;
                    var dy = b.y - a.y;
                    var len = Math.sqrt(dx * dx + dy * dy);
                    if (len < 18) continue;

                    if (!best || len > best.len) {
                        best = {
                            x: (a.x + b.x) / 2,
                            y: (a.y + b.y) / 2,
                            rawAngle: Math.atan2(dy, dx) * 180 / Math.PI,
                            len: len
                        };
                    }
                }
            }
            return best;
        }

        function labelBoxesOverlap(a, b) {
            return !(a.right < b.left || a.left > b.right || a.bottom < b.top || a.top > b.bottom);
        }

        function hideOverlappingRoadLabels() {
            var shown = [];
            var roadLabels = Array.prototype.slice.call(document.querySelectorAll('.road-label-along-line'));

            roadLabels.sort(function(a, b) {
                return Number(b.getAttribute('data-road-length')) - Number(a.getAttribute('data-road-length'));
            });

            for (var i = 0; i < roadLabels.length; i++) {
                var label = roadLabels[i];
                label.style.display = '';
                var box = label.getBoundingClientRect();
                var overlaps = false;

                for (var j = 0; j < shown.length; j++) {
                    if (labelBoxesOverlap(box, shown[j])) {
                        overlaps = true;
                        break;
                    }
                }

                if (overlaps) {
                    label.style.display = 'none';
                } else {
                    shown.push(box);
                }
            }
        }

        function drawRoadLabels() {
            var pane = map.getPane('pane_RoadLabels_Custom');
            if (!pane) return;

            pane.querySelectorAll('.road-label-along-line').forEach(function(el) {
                el.remove();
            });

            layer_Roads_10.eachLayer(function(layer) {
                var labelText = layer.feature && layer.feature.properties
                    ? layer.feature.properties['Road_Label']
                    : null;

                if (!hasPopupValue(labelText)) return;

                var pos = bestLabelPosition(layer);
                if (!pos) return;

                var div = document.createElement('div');
                div.className = 'road-label-along-line';
                div.textContent = String(labelText);

                var angle = correctedRoadLabelAngle(pos.rawAngle, pos.x, pos.y);

                div.setAttribute('data-road-length', pos.len);
                div.setAttribute('data-road-angle', angle);
                div.style.left = pos.x + 'px';
                div.style.top = pos.y + 'px';
                div.style.transform = 'translate(-50%, -50%) rotate(' + angle + 'deg)';

                pane.appendChild(div);
            });

            hideOverlappingRoadLabels();
        }

        function setRoadLabelsVisible(visible) {
            var pane = map.getPane('pane_RoadLabels_Custom');
            if (!pane) return;

            pane.style.display = visible ? 'block' : 'none';
        }

        var roadLabelRedrawTimer = null;

        function scheduleRoadLabelRedraw() {
            if (roadLabelRedrawTimer) {
                clearTimeout(roadLabelRedrawTimer);
            }

            roadLabelRedrawTimer = setTimeout(function() {
                setRoadLabelsVisible(true);
                drawRoadLabels();
            }, 150);
        }

        map.whenReady(function() {
            setRoadLabelsVisible(true);
            drawRoadLabels();
        });

        map.on('zoomstart', function() {
            setRoadLabelsVisible(false);
        });

        map.on('zoomend', function() {
            scheduleRoadLabelRedraw();
        });

        map.on('moveend', function() {
            scheduleRoadLabelRedraw();
        });
